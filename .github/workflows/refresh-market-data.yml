name: Refresh market data

on:
  push:
    branches:
      - main
    paths:
      - ".github/workflows/refresh-market-data.yml"
      - "server.js"
      - "tools/refresh_market_data.js"
  workflow_dispatch:
    inputs:
      cycles:
        description: "How many 5-minute refresh cycles to run"
        required: false
        default: "12"
  schedule:
    - cron: "3,8,13,18,23,28,33,38,43,48,53,58 * * * *"

permissions:
  contents: write

concurrency:
  group: refresh-market-data
  cancel-in-progress: false

jobs:
  refresh:
    runs-on: ubuntu-latest
    env:
      SMTP_HOST: smtp.gmail.com
      SMTP_PORT: 465
      SMTP_USER: ${{ secrets.SMTP_USER }}
      SMTP_PASS: ${{ secrets.SMTP_PASS }}
      SMTP_FROM: ${{ secrets.SMTP_USER }}
      ALERT_EMAIL_TO: pohlk888@gmail.com,li_keong_poh@umc.com,hsiang_yu_hsieh@umc.com
      SPY_DRAWDOWN_ALARM_PERCENT: 3.5
      ALERT_EMAIL_COOLDOWN_MS: 21600000
      ALLOWED_ORIGINS: https://pohlk888.github.io
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Refresh and publish market data
        env:
          REFRESH_CYCLES: ${{ github.event.inputs.cycles || '1' }}
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          cycles="$REFRESH_CYCLES"
          case "$cycles" in
            ''|*[!0-9]*) cycles=1 ;;
          esac
          if [ "$cycles" -lt 1 ]; then cycles=1; fi
          if [ "$cycles" -gt 12 ]; then cycles=12; fi

          for cycle in $(seq 1 "$cycles"); do
            git pull --rebase origin main
            node tools/refresh_market_data.js
            git add data/quotes.json data/alarm-state.json
            git diff --cached --quiet || git commit -m "Refresh market data"
            git push

            if [ "$cycle" -lt "$cycles" ]; then
              sleep 300
            fi
          done
