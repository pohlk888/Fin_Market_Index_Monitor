name: Refresh market data

on:
  workflow_dispatch:
  schedule:
    - cron: "*/5 * * * *"

permissions:
  contents: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    env:
      SMTP_HOST: smtp.gmail.com
      SMTP_PORT: 465
      SMTP_USER: ${{ secrets.SMTP_USER }}
      SMTP_PASS: ${{ secrets.SMTP_PASS }}
      SMTP_FROM: ${{ secrets.SMTP_USER }}
      ALERT_EMAIL_TO: pohlk888@gmail.com,li_keong_poh@umc.com,hsiang_yu_hsieh@umc.com
      SPY_DRAWDOWN_ALARM_PERCENT: 3.5
      ALERT_EMAIL_COOLDOWN_MS: 21600000
      ALLOWED_ORIGINS: https://pohlk888.github.io
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - run: node tools/refresh_market_data.js
      - name: Commit refreshed market data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/quotes.json data/alarm-state.json
          git diff --cached --quiet || git commit -m "Refresh market data"
          git push
